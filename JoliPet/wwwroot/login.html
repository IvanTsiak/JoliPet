<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            margin-top: 100px;
        }
        .card {
            border: 1px solid #ccc;
            padding: 20px;
            width: 300px;
            text-align: center;
        }
        input {
            margin-bottom: 10px;
            width: 90%;
            padding: 5px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Login</h2>
    <input type="text" id="email" placeholder="Email"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="login()">Увійти</button>
    <p id="error-msg" style="color: red; display: none;">Wrong email or password</p>
</div>

<script src="js/login.js"></script>
</body>
</html>
